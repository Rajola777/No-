<!-- Created by rajola - Complete Working Login System -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crunk Games - Your Ultimate Gaming Platform">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
    
    <title>Crunk Games - Login</title>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
    </div>

    <div class="container">
        <!-- Logo / Brand -->
        <div class="logo-container">
            <div class="logo-icon">
                <i class="fas fa-gamepad"></i>
            </div>
            <h1>Crunk Games</h1>
            <p class="tagline">Your Ultimate Gaming Destination</p>
        </div>
        
        <!-- Login/Register Form -->
        <form id="loginForm">
            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="off">
                </div>
                <span id="usernameError" class="error-message"></span>
            </div>
            
            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="Enter email" autocomplete="off">
                </div>
                <span id="emailError" class="error-message"></span>
            </div>
            
            <!-- Phone Number with Country Code -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="phone-group">
                    <select id="countryCode" class="country-code" required>
                        <option value="" disabled selected>Code</option>
                    </select>
                    <div class="input-wrapper phone-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="phone" placeholder="Phone number" autocomplete="off">
                    </div>
                </div>
                <span id="phoneError" class="error-message"></span>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <span class="btn-text">Login / Register</span>
                <div class="btn-loader" style="display: none;"></div>
            </button>
            
            <!-- Message Display -->
            <div id="message" class="message" style="display: none;"></div>
        </form>
        
        <!-- Divider -->
        <div class="divider">
            <span>Or continue with</span>
        </div>
        
        <!-- Google Login Button -->
        <button onclick="handleGoogleLogin()" class="google-btn" id="googleBtn">
            <i class="fab fa-google"></i>
            <span>Continue with Google</span>
            <div class="google-loader" style="display: none;"></div>
        </button>
        
        <!-- Footer -->
        <div class="footer-links">
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Help</a>
        </div>
    </div>
    
    <!-- Loader Overlay -->
    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Firebase SDK -->
    <script type="module" src="login.js"></script>
</body>
</html>
