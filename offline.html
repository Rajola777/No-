<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Crunk Chat</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .offline-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: #333;
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .offline-icon i {
            font-size: 40px;
            color: #ef4444;
        }
        h2 {
            color: #1f2937;
            margin-bottom: 10px;
        }
        p {
            color: #6b7280;
            margin-bottom: 20px;
        }
        .btn-retry {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-retry:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        .cached-info {
            margin-top: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 10px;
            font-size: 14px;
            color: #4b5563;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <i class="fas fa-wifi"></i>
        </div>
        <h2>You're Offline</h2>
        <p>Don't worry! You can still browse cached content and your messages will be sent when you're back online.</p>
        
        <div class="cached-info">
            <i class="fas fa-info-circle" style="color: #3b82f6; margin-right: 8px;"></i>
            <span>Your recent chats are available offline</span>
        </div>
        
        <button onclick="window.location.reload()" class="btn-retry">
            <i class="fas fa-sync-alt"></i> Try Again
        </button>
        
        <p style="margin-top: 20px; font-size: 12px;">
            <i class="fas fa-robot"></i> Venocyber-MD by rajola
        </p>
    </div>
</body>
</html>
